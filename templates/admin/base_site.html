{% extends "admin/base.html" %}

{% block title %}{{ title }} | Braga Treinamentos Admin{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}" style="display: flex; align-items: center; gap: 8px; text-decoration: none;">
        <span style="color: #FFE81F; font-size: 1.5rem; font-weight: 800; display: inline-flex; align-items: center; gap: 8px;">
            <span style="background: #FFE81F; color: #000000; width: 32px; height: 32px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; font-family: sans-serif; margin-right: 4px;">B</span>
        </span>
        <span style="color: #FFFFFF; font-weight: 700; font-size: 1.25rem;">Braga Treinamentos Admin</span>
    </a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* Google Fonts import */
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    body, input, select, textarea, button {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
    }

    /* Braga Treinamentos Theme for Django Admin */
    :root {
        --primary: #FFE81F !important;
        --primary-fg: #000000 !important;
        --primary-dark: #E6D11B !important;
        --accent: #FFE81F !important;
        --accent-fg: #000000 !important;
        --header-bg: #111119 !important;
        --header-color: #FFE81F !important;
        --header-link-color: #FFFFFF !important;
        --breadcrumbs-bg: #181824 !important;
        --breadcrumbs-link-color: #cccccc !important;
        --breadcrumbs-active-color: #FFE81F !important;
        --link-color: #FFE81F !important;
        --link-hover-color: #E6D11B !important;
        --button-bg: #FFE81F !important;
        --button-fg: #000000 !important;
        --button-hover-bg: #E6D11B !important;
        --button-hover-fg: #000000 !important;
        --body-bg: #121216 !important;
        --body-fg: #f5f5f7 !important;
        --border-color: #2a2a36 !important;
        --message-success-bg: rgba(40, 167, 69, 0.15) !important;
        --message-success-color: #28a745 !important;
        --message-warning-bg: rgba(255, 193, 7, 0.15) !important;
        --message-warning-color: #ffc107 !important;
        --message-error-bg: rgba(220, 53, 69, 0.15) !important;
        --message-error-color: #dc3545 !important;
    }

    body {
        background-color: var(--body-bg) !important;
        color: var(--body-fg) !important;
    }

    #header {
        background: var(--header-bg) !important;
        border-bottom: 2px solid var(--primary) !important;
        padding: 10px 40px !important;
    }

    div.breadcrumbs {
        background: var(--breadcrumbs-bg) !important;
        border-bottom: 1px solid var(--border-color) !important;
        padding: 10px 40px !important;
        color: var(--breadcrumbs-link-color) !important;
    }

    div.breadcrumbs a {
        color: var(--breadcrumbs-link-color) !important;
    }

    div.breadcrumbs a:hover {
        color: var(--primary) !important;
    }

    /* Grid Layout for App Modules on Dashboard */
    @media (min-width: 768px) {
        #content-main {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)) !important;
            gap: 24px !important;
        }
    }

    /* Premium Glow Card Styles for Modules */
    .module {
        background: rgba(30, 30, 45, 0.6) !important;
        border: 1px solid rgba(255, 232, 31, 0.1) !important;
        border-radius: 16px !important;
        margin-bottom: 0 !important;
        overflow: hidden !important;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3) !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        backdrop-filter: blur(10px) !important;
    }

    .module:hover {
        transform: translateY(-4px) !important;
        border-color: rgba(255, 232, 31, 0.3) !important;
        box-shadow: 0 12px 40px rgba(255, 232, 31, 0.1) !important;
    }

    .module caption, .module h2 {
        background: linear-gradient(135deg, rgba(255, 232, 31, 0.15), rgba(255, 232, 31, 0.03)) !important;
        color: #FFE81F !important;
        font-weight: 800 !important;
        border-bottom: 1px solid rgba(255, 232, 31, 0.15) !important;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.05em;
        padding: 14px 20px !important;
    }

    .module table {
        margin: 0 !important;
        width: 100% !important;
    }

    .module table th, .module table td {
        border-bottom: 1px solid var(--border-color) !important;
        padding: 12px 15px !important;
    }

    .module table tr:hover td {
        background: rgba(255, 252, 220, 0.04) !important;
    }

    /* CSS-injected Emojis/Icons for Models */
    .model-user a::before { content: "👤 "; font-size: 1.1rem; margin-right: 6px; }
    .model-course a::before { content: "📚 "; font-size: 1.1rem; margin-right: 6px; }
    .model-class a::before { content: "🏫 "; font-size: 1.1rem; margin-right: 6px; }
    .model-assignment a::before { content: "📝 "; font-size: 1.1rem; margin-right: 6px; }
    .model-submission a::before { content: "📤 "; font-size: 1.1rem; margin-right: 6px; }
    .model-attendance a::before { content: "⏱️ "; font-size: 1.1rem; margin-right: 6px; }
    .model-streampost a::before { content: "📣 "; font-size: 1.1rem; margin-right: 6px; }
    .model-materialfolder a::before { content: "📁 "; font-size: 1.1rem; margin-right: 6px; }
    .model-material a::before { content: "📎 "; font-size: 1.1rem; margin-right: 6px; }
    .model-certificate a::before { content: "🎓 "; font-size: 1.1rem; margin-right: 6px; }
    .model-group a::before { content: "👥 "; font-size: 1.1rem; margin-right: 6px; }
    .model-lesson a::before { content: "📖 "; font-size: 1.1rem; margin-right: 6px; }
    .model-enrollment a::before { content: "🎫 "; font-size: 1.1rem; margin-right: 6px; }

    /* Action buttons: Add and Change */
    .addlink, .changelink {
        display: inline-flex !important;
        align-items: center !important;
        font-size: 0.75rem !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        padding: 5px 12px !important;
        border-radius: 20px !important;
        transition: all 0.2s ease !important;
        letter-spacing: 0.05em !important;
        border: 1px solid transparent !important;
        background-image: none !important;
    }

    .addlink {
        background: rgba(40, 167, 69, 0.15) !important;
        color: #28c745 !important;
        border-color: rgba(40, 167, 69, 0.3) !important;
    }

    .addlink:hover {
        background: #28c745 !important;
        color: #000000 !important;
        text-decoration: none !important;
    }

    .changelink {
        background: rgba(255, 232, 31, 0.1) !important;
        color: #FFE81F !important;
        border-color: rgba(255, 232, 31, 0.3) !important;
    }

    .changelink:hover {
        background: #FFE81F !important;
        color: #000000 !important;
        text-decoration: none !important;
    }

    /* Input elements style */
    input[type=text], input[type=password], input[type=email], select, textarea {
        background: rgba(0, 0, 0, 0.2) !important;
        border: 1px solid var(--border-color) !important;
        color: #fff !important;
        border-radius: 6px !important;
        padding: 8px 12px !important;
    }

    input[type=text]:focus, input[type=password]:focus, input[type=email]:focus, select:focus, textarea:focus {
        border-color: var(--primary) !important;
        outline: none !important;
        box-shadow: 0 0 5px rgba(255, 232, 31, 0.3) !important;
    }

    /* Buttons */
    .submit-row input, .button, input[type=submit], input[type=button] {
        background: var(--button-bg) !important;
        color: var(--button-fg) !important;
        font-weight: 600 !important;
        border-radius: 20px !important;
        padding: 10px 20px !important;
        border: none !important;
        transition: all 0.2s ease !important;
        cursor: pointer !important;
    }

    .submit-row input:hover, .button:hover, input[type=submit]:hover, input[type=button]:hover {
        background: var(--button-hover-bg) !important;
        transform: translateY(-1px) !important;
        box-shadow: 0 4px 10px rgba(255, 232, 31, 0.2) !important;
    }

    .submit-row input.default {
        background: var(--primary) !important;
        border: 1px solid var(--primary-dark) !important;
    }

    /* Recent actions panel */
    #content-related {
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid rgba(255, 255, 255, 0.06) !important;
        border-radius: 12px !important;
        padding: 20px !important;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2) !important;
    }

    #content-related h3 {
        color: var(--primary) !important;
        font-weight: 700 !important;
        border-bottom: 1px solid var(--border-color) !important;
        padding-bottom: 10px !important;
        margin-bottom: 15px !important;
    }

    #content-related ul li {
        color: #bbb !important;
        padding: 6px 0 !important;
    }

    /* Links inside lists */
    a:link, a:visited {
        color: var(--primary) !important;
        text-decoration: none !important;
    }

    a:hover {
        color: var(--primary-dark) !important;
        text-decoration: underline !important;
    }

    /* Header tools */
    #user-tools {
        background: rgba(255, 255, 255, 0.05) !important;
        padding: 6px 16px !important;
        border-radius: 20px !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        display: inline-flex !important;
        align-items: center !important;
        gap: 12px !important;
    }

    #user-tools a {
        color: #fff !important;
    }

    #user-tools a:hover {
        color: var(--primary) !important;
        text-decoration: none !important;
    }
</style>
{% endblock %}
