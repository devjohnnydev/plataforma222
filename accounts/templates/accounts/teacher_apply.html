<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quero Ensinar — Braga Treinamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --brand-primary: #FFE81F; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at top right, #0f3460 0%, #16213e 50%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .auth-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .brand-logo { font-size: 2rem; font-weight: 800; color: var(--brand-primary); letter-spacing: -1px; }
        .form-control {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            border-radius: 10px;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.1);
            border-color: var(--brand-primary);
            color: #fff;
            box-shadow: 0 0 0 3px rgba(255,232,31,0.2);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .btn-brand {
            background: var(--brand-primary);
            color: #000;
            font-weight: 700;
            border-radius: 10px;
            padding: 0.75rem;
            font-size: 1rem;
            border: none;
            transition: all 0.2s;
        }
        .btn-brand:hover { background: #e6d11b; color: #000; transform: translateY(-1px); }
        .input-group-text {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
        }
        .divider { border-color: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="text-center mb-4 d-flex flex-column align-items-center">
            <div class="rounded-3 bg-warning text-dark d-flex align-items-center justify-content-center fw-bold shadow-sm mb-2" 
                 style="width: 50px; height: 50px; font-size: 1.8rem; font-family: 'Inter', sans-serif;">
                B
            </div>
            <h4 class="fw-bold text-white mb-0">Braga Treinamentos</h4>
            <p class="text-secondary small mt-1">Inscreva-se como professor e crie suas turmas</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} border-0 rounded-3 py-2 mb-3 small" role="alert">
                    <i class="bi {% if message.tags == 'error' %}bi-exclamation-triangle-fill{% else %}bi-check-circle-fill{% endif %} me-2"></i>{{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'accounts:teacher_apply' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label text-secondary small fw-semibold">Nome Completo</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="name" class="form-control" placeholder="Seu nome completo" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary small fw-semibold">E-mail Corporativo</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary small fw-semibold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required style="border-top-right-radius: 0; border-bottom-right-radius: 0;">
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password', this)" style="background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-left: 0; border-radius: 0 10px 10px 0; color: rgba(255,255,255,0.6);">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small fw-semibold">Confirmar Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" name="password2" id="password2" class="form-control" placeholder="Repita a senha" required style="border-top-right-radius: 0; border-bottom-right-radius: 0;">
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password2', this)" style="background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-left: 0; border-radius: 0 10px 10px 0; color: rgba(255,255,255,0.6);">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-brand w-100">
                Enviar Solicitação <i class="bi bi-send ms-2"></i>
            </button>
        </form>

        <hr class="divider my-4">
        <p class="text-center text-secondary small mb-0">
            Você é um aluno?
            <a href="{% url 'accounts:register' %}" class="fw-semibold text-decoration-none" style="color: var(--brand-primary);">Cadastre-se aqui</a>
        </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }
    </script>
</body>
</html>
