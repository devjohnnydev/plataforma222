{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
    <h2 class="fw-bold"><i class="bi bi-robot me-2 text-brand"></i>Mister - Assistente IA</h2>
    <a href="?clear=1" class="btn btn-outline-danger btn-sm rounded-pill px-3">
        <i class="bi bi-trash3 me-1"></i>Limpar Conversa
    </a>
</div>

<div class="card bg-body-tertiary shadow-sm border-0 rounded-4" style="height: 60vh;">
    <div class="card-body d-flex flex-column" x-data="chatApp()">
        <!-- Chat History -->
        <div class="flex-grow-1 overflow-auto mb-3 pe-2" id="chat-history" x-init="scrollToBottom()">
            <div class="text-center text-muted small my-3">Início da conversa com o Mister</div>
            
            <template x-for="msg in messages" :key="msg.id">
                <div :class="['mb-3 d-flex', msg.role === 'user' ? 'justify-content-end' : 'justify-content-start']">
                    <div :class="['p-3 rounded-4 shadow-sm', msg.role === 'user' ? 'bg-brand text-dark' : 'bg-body border border-secondary']" style="max-width: 75%;">
                        <div class="d-flex align-items-center mb-1">
                            <i :class="['bi me-2', msg.role === 'user' ? 'bi-person-fill' : 'bi-robot text-brand']"></i>
                            <strong class="small" x-text="msg.role === 'user' ? 'Você' : 'Mister'"></strong>
                        </div>
                        <div x-html="msg.content" class="text-break" style="white-space: pre-wrap;"></div>
                    </div>
                </div>
            </template>
            
            <div x-show="loading" class="mb-3 d-flex justify-content-start">
                <div class="p-3 rounded-4 shadow-sm bg-body border border-secondary text-muted">
                    <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Mister está digitando...
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="mt-auto border-top border-secondary pt-3">
            <form @submit.prevent="sendMessage" class="d-flex gap-2">
                <input type="text" x-model="userInput" class="form-control form-control-lg bg-body text-body" placeholder="Pergunte algo ao Mister..." :disabled="loading" required>
                <button type="submit" class="btn btn-brand btn-lg rounded-circle px-3" :disabled="loading || !userInput.trim()">
                    <i class="bi bi-send-fill"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<style>
    .bg-brand { background-color: var(--brand-primary); }
    #chat-history::-webkit-scrollbar { width: 6px; }
    #chat-history::-webkit-scrollbar-thumb { background-color: var(--bs-border-color); border-radius: 4px; }
</style>

<script>
    function chatApp() {
        return {
            userInput: '',
            loading: false,
            messages: {{ chat_history_json|safe|default:"[]" }},
            
            async sendMessage() {
                if (!this.userInput.trim() || this.loading) return;
                
                const userText = this.userInput;
                this.messages.push({
                    id: Date.now(),
                    role: 'user',
                    content: userText
                });
                
                this.userInput = '';
                this.loading = true;
                
                this.scrollToBottom();
                
                try {
                    const response = await fetch('{% url "core:chat" %}', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: JSON.stringify({ message: userText })
                    });
                    
                    const data = await response.json();
                    
                    this.messages.push({
                        id: Date.now(),
                        role: 'assistant',
                        content: data.response || "Desculpe, não consegui processar sua mensagem."
                    });
                } catch (error) {
                    this.messages.push({
                        id: Date.now(),
                        role: 'assistant',
                        content: "Ocorreu um erro ao conectar com o Mister."
                    });
                } finally {
                    this.loading = false;
                    this.scrollToBottom();
                }
            },
            
            scrollToBottom() {
                setTimeout(() => {
                    const el = document.getElementById('chat-history');
                    el.scrollTop = el.scrollHeight;
                }, 100);
            }
        }
    }
</script>
{% endblock %}
