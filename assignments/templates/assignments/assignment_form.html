{% extends 'base.html' %}

{% block title %}Nova Atividade — {{ cls.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">

        <div class="mb-4">
            <a href="{% url 'classes:classwork' pk=cls.pk %}" class="text-muted text-decoration-none small">
                <i class="bi bi-arrow-left me-1"></i>{{ cls.name }} — Atividades
            </a>
        </div>

        <div class="card bg-body-tertiary border-0 shadow rounded-4">
            <div class="card-body p-4 p-md-5">
                <h2 class="fw-bold mb-1">Nova Atividade</h2>
                <p class="text-muted small mb-4">Para a turma: <strong>{{ cls.name }}</strong></p>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="title" class="form-label fw-semibold">Título <span class="text-danger">*</span></label>
                        <input type="text" class="form-control bg-body" id="title" name="title"
                               placeholder="Ex.: Lista de Exercícios 1" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label fw-semibold">Descrição / Enunciado</label>
                        <textarea class="form-control bg-body" id="description" name="description"
                                  rows="5" placeholder="Descreva o que os alunos devem fazer..."></textarea>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label for="assignment_type" class="form-label fw-semibold">Tipo</label>
                            <select class="form-select bg-body" id="assignment_type" name="assignment_type">
                                {% for value, label in assignment_types %}
                                    <option value="{{ value }}">{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-sm-6">
                            <label for="max_score" class="form-label fw-semibold">Nota Máxima</label>
                            <input type="number" class="form-control bg-body" id="max_score" name="max_score"
                                   value="10" min="1" max="1000" step="0.5">
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-sm-8">
                            <label for="due_date" class="form-label fw-semibold">Prazo de Entrega</label>
                            <input type="datetime-local" class="form-control bg-body" id="due_date" name="due_date">
                        </div>
                        <div class="col-sm-4 d-flex align-items-end">
                            <div class="form-check pb-2">
                                <input class="form-check-input" type="checkbox" id="allow_late" name="allow_late">
                                <label class="form-check-label small" for="allow_late">
                                    Aceitar entrega atrasada
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-brand btn-lg rounded-pill">
                            <i class="bi bi-check2-circle me-2"></i>Criar Atividade
                        </button>
                        <a href="{% url 'classes:classwork' pk=cls.pk %}" class="btn btn-outline-secondary rounded-pill">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
